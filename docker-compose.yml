services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NOVASCANS_DB_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${NOVASCANS_DB_NAME:-novascans}
      POSTGRES_USER: ${NOVASCANS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${NOVASCANS_DB_PASSWORD:-postgres}
      NOVASCANS_POSTGRES_TEST_DB: ${NOVASCANS_DB_TEST_NAME:-novascans_test}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOVASCANS_DB_USER:-postgres} -d ${NOVASCANS_DB_NAME:-novascans}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
