version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema"
    queries: "db/queries/identity/auth"
    gen:
      go:
        package: "authsqlc"
        out: "internal/gen/sqlc/identity/auth"
        sql_package: "database/sql"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
  - engine: "postgresql"
    schema: "db/schema"
    queries: "db/queries/identity/access"
    gen:
      go:
        package: "accesssqlc"
        out: "internal/gen/sqlc/identity/access"
        sql_package: "database/sql"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
  - engine: "postgresql"
    schema: "db/schema"
    queries: "db/queries/user/account"
    gen:
      go:
        package: "accountsqlc"
        out: "internal/gen/sqlc/user/account"
        sql_package: "database/sql"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
